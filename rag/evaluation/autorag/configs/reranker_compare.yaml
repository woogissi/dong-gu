# Reranker and passage filter comparison.
# Use after a labeled qa.parquet has enough ground-truth chunk IDs.

node_lines:
  - node_line_name: reranker_filter_compare
    nodes:
      - node_type: lexical_retrieval
        strategy:
          metrics:
            - retrieval_recall
            - retrieval_precision
            - retrieval_ndcg
            - retrieval_mrr
          speed_threshold: 10
        top_k: 20
        modules:
          - module_type: bm25

      - node_type: semantic_retrieval
        strategy:
          metrics:
            - retrieval_recall
            - retrieval_precision
            - retrieval_ndcg
            - retrieval_mrr
          speed_threshold: 10
        top_k: 20
        modules:
          - module_type: vectordb
            vectordb: default

      - node_type: hybrid_retrieval
        strategy:
          metrics:
            - retrieval_recall
            - retrieval_precision
            - retrieval_ndcg
            - retrieval_mrr
          speed_threshold: 10
        top_k: 20
        modules:
          - module_type: hybrid_rrf
          - module_type: hybrid_cc
            normalize_method:
              - mm
              - tmm
            test_weight_size: 11

      - node_type: passage_reranker
        strategy:
          metrics:
            - retrieval_recall
            - retrieval_precision
            - retrieval_ndcg
            - retrieval_mrr
          speed_threshold: 20
        top_k:
          - 3
          - 5
          - 10
        modules:
          - module_type: pass_reranker
          - module_type: ko_reranker
            batch: 32
          - module_type: monot5
            batch: 16
          - module_type: sentence_transformer_reranker
            batch: 32
          - module_type: time_reranker

      - node_type: passage_filter
        strategy:
          metrics:
            - retrieval_recall
            - retrieval_precision
            - retrieval_ndcg
            - retrieval_mrr
          speed_threshold: 10
        modules:
          - module_type: pass_passage_filter
          - module_type: similarity_threshold_cutoff
            threshold:
              - 0.70
              - 0.80
              - 0.85
          - module_type: recency_filter
            threshold_datetime:
              - "2025-01-01"
              - "2026-01-01"
