x-amd-wsl-gpu: &amd-wsl-gpu
  build:
    args:
      PYTORCH_INDEX_URL: https://download.pytorch.org/whl/rocm6.3
  devices:
    - /dev/dxg:/dev/dxg
  volumes:
    - /usr/lib/wsl/lib/libdxcore.so:/usr/lib/libdxcore.so:ro
    - /opt/rocm/lib/libhsa-runtime64.so.1:/opt/rocm/lib/libhsa-runtime64.so.1:ro
  cap_add:
    - SYS_PTRACE
  security_opt:
    - seccomp=unconfined
  ipc: host
  shm_size: 8g

services:
  backend:
    <<: *amd-wsl-gpu

  rag:
    <<: *amd-wsl-gpu

  crawler:
    <<: *amd-wsl-gpu
