services:
  backend:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    container_name: donggu-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
    env_file:
      - .env
    environment:
      PYTHONPATH: /app
      RAG_API_URL: http://rag:8001
    command: uvicorn backend.app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      - rag

  rag:
    build:
      context: .
      dockerfile: ./rag/Dockerfile
    container_name: donggu-rag
    volumes:
      - ./rag:/app/rag
    env_file:
      - .env
    environment:
      PYTHONPATH: /app
    command: uvicorn rag.app.main:app --host 0.0.0.0 --port 8001 --reload

  autorag-eval:
    build:
      context: .
      dockerfile: ./rag/evaluation/autorag/Dockerfile
    container_name: donggu-autorag-eval
    profiles:
      - eval
    volumes:
      - ./rag:/app/rag
    env_file:
      - .env
    environment:
      PYTHONPATH: /app
    command: python -m rag.evaluation.autorag.scripts.export_corpus_to_autorag --check-connection

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: donggu-cloudflared
    command: tunnel --no-autoupdate --url http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped

  crawler:
    build:
      context: ./crawler
      dockerfile: Dockerfile
    container_name: donggu-crawler
    volumes:
      - ./crawler:/app
    env_file:
      - .env
    environment:
      - HWP5TXT_PATH=hwp5txt
      # - CRAWLER_DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:${POSTGRES_PORT:-5432}/${POSTGRES_DB}
    depends_on:
      - postgres
    command: tail -f /dev/null

  postgres:
    image: pgvector/pgvector:pg15
    container_name: donggu-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro

  pgadmin:
    image: dpage/pgadmin4
    container_name: donggu-pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin1234
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data:
